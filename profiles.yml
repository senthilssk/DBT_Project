# profiles.yml
default: # This name must match the 'profile:' name in your dbt_project.yml
  outputs:
    dev:
      type: snowflake
      account: '' # Leave as empty string
      user: ''    # Leave as empty string
      role: ACCOUNTADMIN       # e.g., ACCOUNTADMIN or SYSADMIN
      warehouse: COMPUTE_WH    # e.g., COMPUTE_WH
      database: DBT_DB     # e.g., ANALYTICS_DB
      schema: DBT_SCHEMA   # e.g., DBT_DEV
      threads: 6
  target: dev